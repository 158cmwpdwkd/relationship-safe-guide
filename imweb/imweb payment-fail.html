<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리커넥트랩 | 결제 실패</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1626;
      --card: #1a2540;
      --line: rgba(212, 145, 108, 0.18);
      --text: #f0ece8;
      --sub: #9aaabb;
      --rose: #d4916c;
      --rose-strong: #be7d5a;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .page {
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px 22px 24px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
    }

    .icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(212, 145, 108, 0.08);
      border: 1px solid rgba(212, 145, 108, 0.24);
      color: var(--rose);
      font-size: 26px;
      font-weight: 800;
    }

    h1 {
      font-size: 24px;
      line-height: 1.35;
      margin-bottom: 10px;
      color: #fff;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 14px;
      line-height: 1.75;
      color: var(--sub);
      margin-bottom: 20px;
      word-break: keep-all;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: 0 20px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--rose), var(--rose-strong));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(212, 145, 108, 0.25);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #7f8da1;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px 12px;
      }

      .card {
        padding: 24px 18px 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="icon">!</div>
      <h1>결제가 취소되었거나 실패했어요</h1>
      <p>무료리포트는 다시 확인할 수 있어요. 아래 버튼을 눌러 이전 결과로 돌아가세요.</p>
      <a id="returnBtn" class="btn" href="/" target="_top">무료리포트 다시 보기</a>
      <div class="hint">결제는 완료되지 않았어요.</div>
    </section>
  </main>

  <script>
    const HOME_URL = "https://reconnectlab.co.kr/";
    const FREE_RETURN_URL_STORAGE_KEY = "rl_free_report_return_url";
    const FREE_REPORT_TOKEN_STORAGE_KEY = "rl_free_report_token";
    const PREMIUM_TOKEN_STORAGE_KEY = "rl_premium_report_token";
    const PAYMENT_LAST_MODE_KEY = "rl_payment_last_mode";
    const PAYMENT_LAST_CODE_KEY = "rl_payment_last_code";
    const PAYMENT_LAST_MSG_KEY = "rl_payment_last_msg";

    const returnBtn = document.getElementById("returnBtn");

    function log(event, payload) {
      console.debug("[RCL payment-fail]", event, payload || {});
    }

    log("payment_fail.page.version", {
      version: "2026-03-22-payment-fail-v2",
      href: window.location.href
    });

    function getStored(key, storage) {
      try {
        return (storage || localStorage).getItem(key) || "";
      } catch (e) {
        return "";
      }
    }

    function removeStored(key, storage) {
      try {
        (storage || localStorage).removeItem(key);
      } catch (e) {}
    }

    function maskToken(token) {
      if (!token) return "";
      return token.length > 8 ? token.slice(0, 4) + "..." + token.slice(-4) : token;
    }

    function validateCanonicalFreeUrl(rawUrl) {
      if (!rawUrl) {
        return { ok: false, reason: "empty_url" };
      }

      try {
        const parsed = new URL(rawUrl, window.location.origin);
        const token = parsed.searchParams.get("token");
        const pathname = (parsed.pathname || "").toLowerCase();
        const hostname = (parsed.hostname || "").toLowerCase();

        log("payment_fail.return_path.normalized", {
          rawUrl: rawUrl,
          hostname: hostname,
          pathname: pathname,
          token: maskToken(token || ""),
          normalizedCandidate: token ? (parsed.origin + parsed.pathname + "?token=" + encodeURIComponent(token)) : ""
        });

        if (!token) return { ok: false, reason: "missing_token" };
        if (pathname.includes("/pay/start")) return { ok: false, reason: "pay_start_path" };
        if (pathname.includes("premium")) return { ok: false, reason: "premium_path" };
        if (pathname.includes("payment-fail")) return { ok: false, reason: "payment_fail_path" };
        if (hostname.includes("onrender.com")) return { ok: false, reason: "api_domain" };

        return {
          ok: true,
          normalized: parsed.origin + parsed.pathname + "?token=" + encodeURIComponent(token)
        };
      } catch (e) {
        return { ok: false, reason: "invalid_url" };
      }
    }

    function getQueryValue(key) {
      try {
        return new URLSearchParams(window.location.search).get(key) || "";
      } catch (e) {
        return "";
      }
    }

    function buildFreeUrlFromToken(token) {
      if (!token) return "";
      return HOME_URL.replace(/\/$/, "") + "/report?token=" + encodeURIComponent(token);
    }

    function resolveReturnUrl() {
      const queryFreeReturnUrl = getQueryValue("free_return_url");
      const queryFreeToken = getQueryValue("free_token");
      const rawLocalUrl = getStored(FREE_RETURN_URL_STORAGE_KEY, localStorage);
      const rawSessionUrl = getStored(FREE_RETURN_URL_STORAGE_KEY, sessionStorage);

      const rawLocalToken = getStored(FREE_REPORT_TOKEN_STORAGE_KEY, localStorage);
      const rawSessionToken = getStored(FREE_REPORT_TOKEN_STORAGE_KEY, sessionStorage);

      log("payment_fail.query.free_return_url", { url: queryFreeReturnUrl || "" });
      log("payment_fail.query.free_token", { token: maskToken(queryFreeToken) });

      const queryUrlCandidate = validateCanonicalFreeUrl(queryFreeReturnUrl);
      if (queryUrlCandidate.ok) {
        log("payment_fail.return_path.selected", { source: "query:free_return_url", url: queryUrlCandidate.normalized });
        return queryUrlCandidate.normalized;
      }
      if (queryFreeReturnUrl) {
        log("payment_fail.return_path.invalid", {
          source: "query:free_return_url",
          reason: queryUrlCandidate.reason,
          attemptedUrl: queryFreeReturnUrl
        });
      }

      if (queryFreeToken) {
        const queryTokenUrl = buildFreeUrlFromToken(queryFreeToken);
        const queryTokenCandidate = validateCanonicalFreeUrl(queryTokenUrl);
        if (queryTokenCandidate.ok) {
          log("payment_fail.return_path.selected", { source: "query:free_token", url: queryTokenCandidate.normalized });
          return queryTokenCandidate.normalized;
        }
        log("payment_fail.return_path.invalid", {
          source: "query:free_token",
          reason: queryTokenCandidate.reason,
          attemptedUrl: queryTokenUrl
        });
      }

      log("payment_fail.return_path.raw_url", {
        localStorage: rawLocalUrl || "",
        sessionStorage: rawSessionUrl || ""
      });
      log("payment_fail.return_path.raw_token", {
        localStorage: maskToken(rawLocalToken),
        sessionStorage: maskToken(rawSessionToken)
      });

      const localCandidate = validateCanonicalFreeUrl(rawLocalUrl);
      if (localCandidate.ok) {
        log("payment_fail.return_path.fallback_storage", { source: "localStorage:url" });
        log("payment_fail.return_path.selected", { source: "localStorage:url", url: localCandidate.normalized });
        return localCandidate.normalized;
      }
      if (rawLocalUrl) {
        log("payment_fail.return_path.invalid", {
          source: "localStorage:url",
          reason: localCandidate.reason,
          attemptedUrl: rawLocalUrl
        });
      }

      const sessionCandidate = validateCanonicalFreeUrl(rawSessionUrl);
      if (sessionCandidate.ok) {
        log("payment_fail.return_path.fallback_storage", { source: "sessionStorage:url" });
        log("payment_fail.return_path.selected", { source: "sessionStorage:url", url: sessionCandidate.normalized });
        return sessionCandidate.normalized;
      }
      if (rawSessionUrl) {
        log("payment_fail.return_path.invalid", {
          source: "sessionStorage:url",
          reason: sessionCandidate.reason,
          attemptedUrl: rawSessionUrl
        });
      }

      if (rawLocalToken || rawSessionToken) {
        const storageToken = rawLocalToken || rawSessionToken;
        const storageTokenUrl = buildFreeUrlFromToken(storageToken);
        const storageTokenCandidate = validateCanonicalFreeUrl(storageTokenUrl);
        if (storageTokenCandidate.ok) {
          log("payment_fail.return_path.fallback_storage", { source: "free_token" });
          log("payment_fail.return_path.selected", { source: "free_token", url: storageTokenCandidate.normalized });
          return storageTokenCandidate.normalized;
        }
        log("payment_fail.return_path.invalid", {
          source: "free_token",
          reason: storageTokenCandidate.reason,
          attemptedUrl: storageTokenUrl
        });
      }

      log("payment_fail.return_path.fallback_home", {
        reason: "no_valid_query_or_storage_free_url",
        rawTokenLocal: maskToken(rawLocalToken),
        rawTokenSession: maskToken(rawSessionToken)
      });
      log("payment_fail.return_path.selected", { source: "home", url: HOME_URL });
      return HOME_URL;
    }

    function cleanupPremiumState() {
      [
        PREMIUM_TOKEN_STORAGE_KEY,
        "rl_premium_entry_token",
        "rl_premium_last_state",
        "rl_premium_runtime_state",
        "rl_premium_frame_session"
      ].forEach((key) => {
        removeStored(key, localStorage);
        removeStored(key, sessionStorage);
      });

      removeStored(PAYMENT_LAST_MODE_KEY, sessionStorage);
      removeStored(PAYMENT_LAST_CODE_KEY, sessionStorage);
      removeStored(PAYMENT_LAST_MSG_KEY, sessionStorage);
      removeStored(PAYMENT_LAST_MODE_KEY, localStorage);
      removeStored(PAYMENT_LAST_CODE_KEY, localStorage);
      removeStored(PAYMENT_LAST_MSG_KEY, localStorage);
    }

    log("payment_fail.enter", {
      href: window.location.href
    });
    log("payment_fail.reason", {
      reason: getQueryValue("reason") || ""
    });
    log("payment_fail.context", {
      is_top_window: window.self === window.top,
      current_url: window.location.href,
      referrer: document.referrer || ""
    });

    cleanupPremiumState();

    if (window.self !== window.top) {
      try {
        window.top.location.replace(window.location.href);
        return;
      } catch (e) {}
    }

    const returnUrl = resolveReturnUrl();
    returnBtn.href = returnUrl;
    log("payment_fail.return_cta.href", { url: returnUrl });

    returnBtn.addEventListener("click", function (event) {
      event.preventDefault();
      log("payment_fail.return_cta.click", { url: returnUrl });
      log("payment_fail.return_cta.target_url", { url: returnUrl });
      try {
        log("payment_fail.return_cta.navigate_top", { url: returnUrl });
        window.top.location.href = returnUrl;
      } catch (e) {
        log("payment_fail.return_cta.navigate_self", { url: returnUrl });
        window.location.href = returnUrl;
      }
    });
  </script>
</body>
</html>
