<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리커넥트랩 | 프리미엄 리포트</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:      #0F1626;
      --bg2:     #1A2540;
      --bg3:     #222E4A;
      --rose:    #D4916C;
      --rose-lt: #EAB89A;
      --teal:    #4ECDC4;
      --amber:   #FFB347;
      --txt:     #F0ECE8;
      --sub:     #9AAABB;
      --divider: rgba(212,145,108,.18);

      --nav-h: 72px;
      --radius: 14px;
      --shadow-rose: 0 4px 18px rgba(212,145,108,.35);
      --shadow-rose-strong: 0 6px 24px rgba(212,145,108,.5);
    }

    html { scroll-behavior: smooth; }

    body{
      background: var(--bg);
      color: var(--txt);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      line-height: 1.75;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a{ color: inherit; text-decoration: none; }

    .wrap{
      max-width: 680px;
      margin: 0 auto;
      padding: 6px 20px;
    }

    .card{
      background: var(--bg2);
      border: 1px solid var(--divider);
      border-radius: var(--radius);
    }

    .btn-grad{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--rose), #BE7D5A);
      color: #fff;
      font-weight: 700;
      border-radius: 50px;
      border: none;
      box-shadow: var(--shadow-rose);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, opacity .2s;
      text-decoration: none;
    }

    .btn-grad:hover{
      transform: translateY(-2px);
      box-shadow: var(--shadow-rose-strong);
      opacity: .95;
    }

    /* ──────────────────────────
       NAV
       ────────────────────────── */
    #rcl-nav{
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 9990;
      padding: 12px 20px;
      background: rgba(15,22,38,.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(212,145,108,.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #rcl-nav .nav-left{
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1 1 auto;
      min-width: 0;
    }

    #rcl-nav .logo{
      font-size: 18px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -.02em;
      white-space: nowrap;
      cursor: pointer;
      transition: opacity .2s;
    }

    #rcl-nav .logo:hover{ opacity: .75; }

    #rcl-nav .logo .back{
      font-size: 14px;
      color: var(--sub);
      margin-right: 6px;
    }

    #rcl-nav .logo .accent{ color: var(--rose); }

    .status-badge{
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      background: rgba(78,205,196,.08);
      border: 1px solid rgba(78,205,196,.2);
      border-radius: 100px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    .status-badge::before{
      content:'';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 5px var(--teal);
    }

    /* ──────────────────────────
       MAIN
       ────────────────────────── */
    #rcl-main{
      padding-top: calc(var(--nav-h)+10px);
    }

    #rcl-report-outer{
      width: 100%;
      padding-bottom: 40px;
    }

    @media (min-width: 769px){
      #rcl-main{
        max-width: 1040px;
        margin: 0 auto;
        padding: 0 20px;
      }
    }

    /* ──────────────────────────
       LOADING / ERROR / STATE
       ────────────────────────── */
    #rcl-loading,
    #rcl-error,
    #rcl-state{
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding: 84px 24px 40px;
      gap: 16px;
    }

    .spinner-ring{
      width: 44px;
      height: 44px;
      border: 3px solid var(--bg3);
      border-top-color: var(--rose);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin{
      to{ transform: rotate(360deg); }
    }

    .state-title{
      font-size: 22px;
      font-weight: 800;
      line-height: 1.35;
    }

    .state-copy{
      font-size: 14px;
      color: var(--sub);
      line-height: 1.75;
      max-width: 360px;
    }

    .state-cta{
      min-height: 48px;
      padding: 0 24px;
      font-size: 15px;
    }

    /* ──────────────────────────
       IFRAME
       ────────────────────────── */
    #rcl-frame-wrap{
      display:none;
      width:100%;
      margin-top:18px;
      margin-bottom:-8px;
      overflow:hidden;
    }

    #rcl-report-frame{
      width:100%;
      border:0;
      display:block;
      height:600px;
      min-height:0;
      opacity:0;
      overflow:hidden;
      transition:height .3s ease, opacity .4s ease;
    }

    #rcl-report-frame.loaded{
      opacity:1;
    }

    /* ──────────────────────────
       FOOTER
       ────────────────────────── */
    #rcl-footer{
      background: var(--bg);
      color: #7a8593;
      padding: 30px 20px 30px;
      border-top: none;
    }

    .footer-container{
      max-width: 900px;
      margin: 0 auto;
      text-align:center;
    }

    .footer-logo{
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 25px;
      color: #a8b2c1;
    }

    .footer-logo span{ color: var(--rose); }

    .footer-links{
      display:flex;
      justify-content:center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .footer-links a{
      color: #a8b2c1;
      font-size: 14px;
      transition: color .3s;
    }

    .footer-links a:hover{
      color:#fff;
    }

    .footer-disclaimer{
      font-size: 13px;
      color: #7a8593;
      line-height: 1.7;
      margin: 20px auto;
      max-width: 720px;
      word-break: keep-all;
    }

    .footer-copy{
      font-size: 13px;
      color: #5a6470;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #2a3142;
    }

    @media (max-width: 480px){
      #rcl-nav{ padding: 10px 14px; }
      #rcl-nav .logo{ font-size: 16px; }
      .wrap{ padding: 0 14px; }
      .state-title{ font-size: 20px; }
    }
  </style>
</head>

<body>
  <nav id="rcl-nav">
    <div class="nav-left">
      <a class="logo" href="/" title="홈으로">
        <span class="back">←</span>리커넥트<span class="accent">랩</span>
      </a>
      <div class="status-badge">프리미엄 분석</div>
    </div>
  </nav>

  <div id="rcl-main">
    <div id="rcl-report-outer">
      <div class="wrap">
        <div id="rcl-loading">
          <div class="spinner-ring"></div>
          <div class="state-title">프리미엄 리포트를 확인하는 중입니다</div>
          <div class="state-copy">잠시만 기다려 주세요.</div>
        </div>

        <div id="rcl-error" style="display:none;">
          <div class="state-title">리포트를 불러올 수 없습니다</div>
          <div class="state-copy">링크가 잘못되었거나 접근 가능한 상태가 아닙니다.</div>
          <a class="btn-grad state-cta" href="https://reconnectlab.co.kr">홈으로 이동</a>
        </div>

        <div id="rcl-state" style="display:none;">
          <div id="rcl-state-title" class="state-title"></div>
          <div id="rcl-state-copy" class="state-copy"></div>
          <a id="rcl-state-cta" class="btn-grad state-cta" href="#" style="display:none;"></a>
        </div>

        <div id="rcl-frame-wrap">
          <iframe
            id="rcl-report-frame"
            title="프리미엄 리포트"
            referrerpolicy="no-referrer"
            scrolling="no"
          ></iframe>
        </div>
      </div>
    </div>
  </div>

  <footer id="rcl-footer">
    <div class="footer-container">
      <div class="footer-logo">리커넥트<span>랩</span></div>

      <div class="footer-links">
        <a href="http://reconnectlab.co.kr/?mode=policy">이용약관</a>
        <a href="http://reconnectlab.co.kr/?mode=privacy">개인정보처리방침</a>
        <a href="https://pf.kakao.com/_xdTxmqX">문의하기</a>
      </div>

      <p class="footer-disclaimer">
        본 서비스의 분석 결과는 자체 데이터 모델 기반의 참고 추정치이며, 법적 효력을 갖는 통계가 아닙니다.<br />
        개인별 상황에 따라 결과가 다를 수 있으며, 본 서비스는 감정 자극이 아니라 안전 중심의 행동 가이드를 제공하기 위한 목적으로 구성됩니다.
      </p>

      <p class="footer-copy">© 2025 리커넥트랩. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const API_BASE = "https://relationship-safe-guide-api.onrender.com";
    const ENTRY_URL = API_BASE + "/api/premium/entry";
    const HOME_URL = "https://reconnectlab.co.kr/";
    const STORAGE_KEY = "rl_premium_report_token";
    const POLL_INTERVAL_MS = 3000;
    const HEIGHT_DEBOUNCE_MS = 120;
    const HEIGHT_MIN_DELTA = 18;

    const loadingEl = document.getElementById("rcl-loading");
    const errorEl = document.getElementById("rcl-error");
    const stateEl = document.getElementById("rcl-state");
    const stateTitleEl = document.getElementById("rcl-state-title");
    const stateCopyEl = document.getElementById("rcl-state-copy");
    const stateCtaEl = document.getElementById("rcl-state-cta");
    const frameWrapEl = document.getElementById("rcl-frame-wrap");
    const frameEl = document.getElementById("rcl-report-frame");

    let lastHeight = 0;
    let pendingHeight = 0;
    let heightRaf = 0;
    let lastHeightAppliedAt = 0;
    let pollHandle = null;
    let bootSeq = 0;
    let activeFrameToken = "";

    function hideAll() {
      loadingEl.style.display = "none";
      errorEl.style.display = "none";
      stateEl.style.display = "none";
      frameWrapEl.style.display = "none";
    }

    function resetFrame() {
      pendingHeight = 0;
      if (heightRaf) {
        cancelAnimationFrame(heightRaf);
        heightRaf = 0;
      }
      lastHeight = 0;
      lastHeightAppliedAt = 0;
      activeFrameToken = "";
      frameEl.classList.remove("loaded");
      frameEl.style.height = "600px";
      if (frameEl.src) {
        frameEl.removeAttribute("src");
      }
    }

    function showLoading(title, copy) {
      hideAll();
      loadingEl.style.display = "flex";
      loadingEl.querySelector(".state-title").textContent = title || "프리미엄 리포트를 확인하는 중입니다";
      loadingEl.querySelector(".state-copy").textContent = copy || "잠시만 기다려 주세요.";
    }

    function showError() {
      hideAll();
      resetFrame();
      errorEl.style.display = "flex";
    }

    function showState(title, copy, ctaLabel, ctaHref) {
      hideAll();
      resetFrame();
      stateEl.style.display = "flex";
      stateTitleEl.textContent = title || "";
      stateCopyEl.textContent = copy || "";
      if (ctaLabel && ctaHref) {
        stateCtaEl.style.display = "inline-flex";
        stateCtaEl.textContent = ctaLabel;
        stateCtaEl.href = ctaHref;
      } else {
        stateCtaEl.style.display = "none";
      }
    }

    function showFrame(token) {
      hideAll();
      frameWrapEl.style.display = "block";
      if (activeFrameToken !== token) {
        frameEl.classList.remove("loaded");
        frameEl.style.height = "600px";
        frameEl.src = API_BASE + "/r/" + encodeURIComponent(token);
        activeFrameToken = token;
      }
    }

    function getQueryToken() {
      try {
        return new URLSearchParams(window.location.search).get("token") || "";
      } catch (e) {
        return "";
      }
    }

    function getPathToken() {
      try {
        const match = (window.location.pathname || "").match(/\/r\/([^/?#]+)/);
        return match ? decodeURIComponent(match[1]) : "";
      } catch (e) {
        return "";
      }
    }

    function getStoredToken() {
      try {
        return localStorage.getItem(STORAGE_KEY) || "";
      } catch (e) {
        return "";
      }
    }

    function setStoredToken(token) {
      try {
        if (token) localStorage.setItem(STORAGE_KEY, token);
      } catch (e) {}
    }

    function getToken() {
      return getQueryToken() || getPathToken() || getStoredToken() || "";
    }

    async function fetchEntry(token) {
      const url = new URL(ENTRY_URL);
      url.searchParams.set("token", token);
      const res = await fetch(url.toString(), { method: "GET" });
      if (!res.ok) {
        throw new Error("ENTRY_FETCH_FAILED");
      }
      return res.json();
    }

    function clearPolling() {
      if (pollHandle) {
        clearTimeout(pollHandle);
        pollHandle = null;
      }
    }

    function scheduleRecheck(token) {
      clearPolling();
      pollHandle = setTimeout(function () {
        boot(token);
      }, POLL_INTERVAL_MS);
    }

    function applyFrameHeight(target) {
      pendingHeight = target;
      if (heightRaf) return;

      heightRaf = requestAnimationFrame(function () {
        heightRaf = 0;

        const now = Date.now();
        if ((now - lastHeightAppliedAt) < HEIGHT_DEBOUNCE_MS) {
          setTimeout(function () {
            applyFrameHeight(pendingHeight);
          }, HEIGHT_DEBOUNCE_MS - (now - lastHeightAppliedAt));
          return;
        }

        const next = pendingHeight;
        pendingHeight = 0;

        if (!next) return;
        if (Math.abs(next - lastHeight) <= HEIGHT_MIN_DELTA) return;
        if (next < lastHeight && (lastHeight - next) < 96) return;

        frameEl.style.height = next + "px";
        lastHeight = next;
        lastHeightAppliedAt = Date.now();
      });
    }

    async function boot(initialToken) {
      const seq = ++bootSeq;
      const token = initialToken || getToken();
      if (!token) {
        clearPolling();
        showError();
        return;
      }

      setStoredToken(token);
      showLoading("프리미엄 리포트를 확인하는 중입니다", "잠시만 기다려 주세요.");

      try {
        const data = await fetchEntry(token);
        if (seq !== bootSeq) return;
        const state = data.state || "";

        if (state === "INVALID_REPORT_TOKEN") {
          clearPolling();
          showError();
          return;
        }

        if (state === "NOT_PAID") {
          clearPolling();
          showState(
            "결제가 필요합니다",
            data.user_message || "프리미엄 리포트를 보려면 결제를 완료해 주세요.",
            "결제 진행하기",
            data.next_url || ("/premium?token=" + encodeURIComponent(token))
          );
          return;
        }

        if (state === "NEED_SURVEY") {
          clearPolling();
          showState(
            "유료 설문 작성이 필요합니다",
            data.user_message || "설문 작성 후 프리미엄 리포트가 생성됩니다.",
            "설문 작성하기",
            data.next_url || "#"
          );
          return;
        }

        if (state === "PROCESSING") {
          showLoading(
            "프리미엄 리포트를 생성 중입니다",
            data.user_message || "생성이 완료되면 자동으로 표시됩니다."
          );
          scheduleRecheck(token);
          return;
        }

        if (state === "READY") {
          clearPolling();
          showFrame(token);
          return;
        }

        clearPolling();
        showError();
      } catch (e) {
        if (seq !== bootSeq) return;
        clearPolling();
        showError();
      }
    }

    frameEl.addEventListener("load", function () {
      frameEl.classList.add("loaded");
    });

    window.addEventListener("message", function (event) {
      const origin = event.origin || "";
      if (
        !origin.startsWith("https://relationship-safe-guide-api.onrender.com") &&
        !origin.startsWith("http://localhost") &&
        !origin.startsWith("http://127.0.0.1")
      ) {
        return;
      }

      const data = event.data;
      if (!data || data.type !== "RCL_REPORT_HEIGHT") return;
      if (typeof data.height !== "number" || data.height <= 0) return;

      const target = Math.min(Math.max(data.height + 72, 720), 14000);
      applyFrameHeight(target);
    });

    document.querySelector("#rcl-nav .logo").addEventListener("click", function (e) {
      e.preventDefault();
      location.href = HOME_URL;
    });

    boot("");
  </script>
</body>
</html>
